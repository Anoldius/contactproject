<!DOCTYPE html>
<html>
<head>
    <title>My Contacts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"> <div class="container mt-5"> <div class="row justify-content-center">
            <div class="col-md-6"> <div class="card shadow p-4 mb-4"> <h3 class="text-primary mb-3">Add New Contact</h3>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-success w-100">Save Contact</button>
                    </form>
                </div>

                <h2 class="mb-3">My Contact List</h2>
                <ul class="list-group shadow-sm"> {% for person in contacts_list %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <div>
                                <strong>{{ person.name }}</strong> <br>
                                <small class="text-muted">{{ person.phone }} | {{ person.email }}</small>
                            </div>
                            <span class="badge bg-info text-dark rounded-pill">{{ person.category }}</span>
                        </li>
                    {% empty %}
                        <li class="list-group-item text-center">No contacts yet!</li>
                    {% endfor %}
                </ul>

            </div>
        </div>
    </div>
</body>
</html>
